
services:

  # ── PostgreSQL 15 (18.1 not yet on Docker Hub, 15 is compatible) ────────────
  postgres:
    image: postgres:15-alpine
    networks:
      - agent_network
    container_name: agent-ai-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB:       reports_db
      POSTGRES_USER:     postgres
      POSTGRES_PASSWORD: postgres123
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── FastAPI Application ────────────────────────────────────────────────────
  fastapi:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: agent-ai-api
    restart: unless-stopped
    networks:
      - agent_network
    environment:
      DB_HOST:          postgres
      DB_PORT:          "5432"
      DB_NAME:          reports_db
      DB_USER:          postgres
      DB_PASSWORD:      postgres123
      #OLLAMA_BASE_URL:  http://host.docker.internal:11434
      OLLAMA_BASE_URL:  http://192.168.1.43:11434
      OLLAMA_MODEL:     llama3.2:latest
      UPLOAD_DIR:       /app/data/uploads
    volumes:
      - ./data/uploads:/app/data/uploads
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── Nginx — serves GUI and proxies API ────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: agent-ai-gui
    restart: unless-stopped
    networks:
      - agent_network
    volumes:
      - ./gui:/usr/share/nginx/html
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    ports:
      - "8080:8080"
    depends_on:
      - fastapi
    user: root
    entrypoint: ["/bin/sh", "-c", "chmod -R 644 /usr/share/nginx/html && chmod 755 /usr/share/nginx/html && nginx -g 'daemon off;'"]
volumes:
  postgres_data:

networks:
  agent_network:
    driver: bridge
